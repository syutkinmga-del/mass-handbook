name: Collect Papers

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query (keywords) or DOI (e.g. 10.3390/jmse13010122)'
        required: true
        default: 'maritime autonomous collision avoidance'
      max_papers:
        description: 'Maximum number of papers to fetch'
        required: true
        default: '20'

# Явно задаём права на запись в репозиторий
permissions:
  contents: write

jobs:
  collect-papers:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openai
        
    - name: Run paper collection script
      run: |
        INPUT="${{ github.event.inputs.query }}"
        echo "Input received: $INPUT"
        
        # Определяем: это DOI или поисковый запрос
        if [[ "$INPUT" =~ ^10\.[0-9]+/.+$ ]]; then
          echo "Mode: DOI lookup"
          python scripts/collect_papers_extended.py \
            --doi "$INPUT" \
            --max-papers ${{ github.event.inputs.max_papers }} \
            --output-dir docs/papers
        else
          echo "Mode: keyword search"
          python scripts/collect_papers_extended.py \
            --query "$INPUT" \
            --max-papers ${{ github.event.inputs.max_papers }} \
            --output-dir docs/papers
        fi
          
    - name: Commit and push new papers
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add docs/papers/
        
        if git diff --staged --quiet; then
          echo "No new papers added (possibly a duplicate)."
        else
          git commit -m "📄 Auto-add paper: ${{ github.event.inputs.query }}"
          git push
          echo "Successfully pushed new papers!"
        fi
