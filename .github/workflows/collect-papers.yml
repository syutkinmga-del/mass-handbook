name: Collect Papers

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query (keywords) or DOI'
        required: true
        default: 'maritime autonomous collision avoidance'
      max_papers:
        description: 'Maximum number of papers to fetch'
        required: true
        default: '20'

jobs:
  collect-papers:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run extended paper collection script
      run: |
        # Detect if input is a DOI or search query
        INPUT="${{ github.event.inputs.query }}"
        echo "Input: $INPUT"
        # Simple DOI pattern: starts with 10. followed by digits, then slash
        if [[ $INPUT =~ ^10\.[0-9]+/.+$ ]]; then
          echo "Detected as DOI"
          # It's a DOI
          python scripts/collect_papers_extended.py \
            --doi "$INPUT" \
            --max-papers ${{ github.event.inputs.max_papers }} \
            --output-dir docs/papers
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        else
          echo "Detected as search query"
          # It's a search query
          python scripts/collect_papers_extended.py \
            --query "$INPUT" \
            --max-papers ${{ github.event.inputs.max_papers }} \
            --output-dir docs/papers
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        fi
          
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Добавляем все изменения в папке docs/papers
        git add docs/papers/
        
        # Коммитим, если есть изменения
        git diff --staged --quiet || git commit -m "Auto-add new papers for query: ${{ github.event.inputs.query }}"
        
        # Пушим изменения обратно в репозиторий
        git push
