name: Collect and Process Papers

on:
  schedule:
    # Запуск каждый понедельник в 2:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  collect-papers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run paper collection script
        env:
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
        run: |
          python scripts/collect_papers.py \
            --query "maritime autonomous collision avoidance" \
            --max-papers 20 \
            --email "$CROSSREF_EMAIL" \
            --output-dir docs/papers
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MASS Handbook Bot"
          git add docs/papers/
          git commit -m "Auto: Add new papers $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

  build-and-deploy:
    needs: collect-papers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Docusaurus
        run: npm run build
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
