name: Collect and Process Papers (Enhanced)

on:
  schedule:
    - cron: '0 2 * * 1' # Каждый понедельник в 2:00 UTC
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: false
        default: 'maritime autonomous collision avoidance'
      max_papers:
        description: 'Maximum papers to collect'
        required: false
        default: '20'
      use_openai:
        description: 'Use OpenAI for processing'
        type: boolean
        required: false
        default: true

jobs:
  collect-papers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Clean old papers
        run: |
          echo "Removing old paper markdown files..."
          rm -f docs/papers/paper_*.md
          echo "Old files removed. Current contents of docs/papers/:"
          ls -la docs/papers/
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai
      
      - name: Run extended paper collection script
        env:
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # ВАЖНО: Добавлен путь scripts/ перед файлом
          CMD="python scripts/collect_papers_extended.py \
            --query \"${{ github.event.inputs.query || 'maritime autonomous collision avoidance' }}\" \
            --max-papers ${{ github.event.inputs.max_papers || '20' }} \
            --email \"$CROSSREF_EMAIL\" \
            --output-dir docs/papers"
            
          if [ "${{ github.event.inputs.use_openai }}" == "true" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            CMD="$CMD --use-openai"
          fi
          
          echo "Running: $CMD"
          eval $CMD
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MASS Handbook Bot"
          git add docs/papers/ collection_summary.json || true
          git commit -m "Auto: Add new processed papers $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
