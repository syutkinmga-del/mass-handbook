name: Collect Papers

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query (keywords) or DOI'
        required: true
        default: 'maritime autonomous collision avoidance'
      max_papers:
        description: 'Maximum number of papers to fetch'
        required: true
        default: '20'

jobs:
  collect-papers:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Нужна полная история для корректного коммита
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run extended paper collection script
      env:
        CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
      run: |
        python scripts/collect_papers_extended.py \
          --query "${{ github.event.inputs.query }}" \
          --max-papers ${{ github.event.inputs.max_papers }} \
          --email "${CROSSREF_EMAIL}" \
          --output-dir docs/papers
          
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Добавляем все изменения в папке docs/papers
        git add docs/papers/
        
        # Коммитим, если есть изменения
        git diff --staged --quiet || git commit -m "Auto-add new papers for query: ${{ github.event.inputs.query }}"
        
        # Пушим изменения обратно в репозиторий
        git push
